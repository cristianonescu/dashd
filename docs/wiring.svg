<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif">
  <!--
    dashd wiring — schematic style.
    Each row is one connection between an ESP32-C3 pin (left column) and a
    ST7789V pin (right column). The button block at the bottom is the second
    net group. Pin order is deliberate so every wire is a straight horizontal
    line — easier to follow when actually wiring it up.
  -->
  <defs>
    <style>
      .bg          { fill: #0A0E14; }
      .title       { fill: #E6EDF3; font-size: 20px; font-weight: 700; }
      .subtitle    { fill: #8B98A5; font-size: 12px; }
      .col-header  { fill: #E6EDF3; font-size: 14px; font-weight: 700; }
      .col-sub     { fill: #8B98A5; font-size: 11px; }
      .pin-box     { fill: #1F2933; stroke: #3A4654; stroke-width: 1.5; }
      .pin-text    { fill: #E6EDF3; font-size: 13px; font-weight: 600; }
      .role        { fill: #8B98A5; font-size: 11px; }
      .wire        { stroke-width: 3; fill: none; stroke-linecap: round; }
      .w-pwr  { stroke: #F85149; }
      .w-gnd  { stroke: #8B98A5; }
      .w-clk  { stroke: #D29922; }
      .w-data { stroke: #4D7FE8; }
      .w-cs   { stroke: #3FB950; }
      .w-dc   { stroke: #C678DD; }
      .w-rst  { stroke: #E5C07B; }
      .w-bl   { stroke: #56B6C2; }
      .w-btn  { stroke: #F85149; stroke-dasharray: 6 4; }
      .device-bg  { fill: #131820; stroke: #3A4654; stroke-width: 1.5; }
      .device-lbl { fill: #E6EDF3; font-size: 12px; font-weight: 600; }
      .device-sub { fill: #8B98A5; font-size: 10px; }
      .screen     { fill: #0A0E14; stroke: #3A4654; stroke-width: 1; }
      .btn-cap    { fill: #2A3441; stroke: #56B6C2; stroke-width: 1.5; }
      .btn-base   { fill: #1F2933; stroke: #3A4654; stroke-width: 1.5; }
      .group-rule { stroke: #1F2933; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="900" height="720"/>

  <!-- Title -->
  <text class="title" x="36" y="40">dashd — wiring</text>
  <text class="subtitle" x="36" y="60">ESP32-C3 SuperMini · ST7789V 240×320 SPI · one tactile button. All 3.3 V logic.</text>

  <!-- Column headers + device illustrations -->
  <g transform="translate(80, 90)">
    <rect class="device-bg" x="0" y="0" width="170" height="46" rx="6"/>
    <text class="device-lbl" x="14" y="20">ESP32-C3 SuperMini</text>
    <text class="device-sub" x="14" y="36">USB-C on top edge</text>
  </g>
  <g transform="translate(650, 90)">
    <rect class="device-bg" x="0" y="0" width="170" height="46" rx="6"/>
    <rect class="screen" x="8" y="8" width="34" height="30" rx="2"/>
    <text class="device-lbl" x="52" y="22">ST7789V 240×320</text>
    <text class="device-sub" x="52" y="36">8-pin SPI panel</text>
  </g>

  <!-- ==================================================================== -->
  <!--  Pin rows. Each row: ESP pin on left, display pin on right, wire     -->
  <!--  between them. Y spacing is 40 px.                                    -->
  <!-- ==================================================================== -->
  <g font-family="-apple-system, sans-serif">
    <!-- Row helper: pin box dimensions -->
    <!-- ESP pin at (left_x, y)   →   Display pin at (right_x, y)           -->

    <!-- Row 1: 3V3 → VCC (red) -->
    <g transform="translate(0, 180)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">3V3</text>
      <text class="role" x="36" y="5" text-anchor="end">power</text>
      <path class="wire w-pwr" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">VCC</text>
      <text class="role" x="794" y="5">3.3 V in</text>
    </g>

    <!-- Row 2: GND → GND (gray) -->
    <g transform="translate(0, 220)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GND</text>
      <text class="role" x="36" y="5" text-anchor="end">ground</text>
      <path class="wire w-gnd" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">GND</text>
      <text class="role" x="794" y="5">ground</text>
    </g>

    <!-- Row 3: GPIO 4 → SCL (yellow / clock) -->
    <g transform="translate(0, 260)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 4</text>
      <text class="role" x="36" y="5" text-anchor="end">SPI clock</text>
      <path class="wire w-clk" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">SCL / SCK</text>
      <text class="role" x="794" y="5">clock in</text>
    </g>

    <!-- Row 4: GPIO 6 → SDA (blue / data) -->
    <g transform="translate(0, 300)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 6</text>
      <text class="role" x="36" y="5" text-anchor="end">SPI data</text>
      <path class="wire w-data" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">SDA / MOSI</text>
      <text class="role" x="794" y="5">data in</text>
    </g>

    <!-- Row 5: GPIO 7 → CS (green) -->
    <g transform="translate(0, 340)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 7</text>
      <text class="role" x="36" y="5" text-anchor="end">chip select</text>
      <path class="wire w-cs" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">CS</text>
      <text class="role" x="794" y="5">chip select</text>
    </g>

    <!-- Row 6: GPIO 5 → DC (purple) -->
    <g transform="translate(0, 380)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 5</text>
      <text class="role" x="36" y="5" text-anchor="end">data/command</text>
      <path class="wire w-dc" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">DC</text>
      <text class="role" x="794" y="5">data/cmd</text>
    </g>

    <!-- Row 7: GPIO 10 → RES (golden) -->
    <g transform="translate(0, 420)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 10</text>
      <text class="role" x="36" y="5" text-anchor="end">reset</text>
      <path class="wire w-rst" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">RES / RST</text>
      <text class="role" x="794" y="5">reset</text>
    </g>

    <!-- Row 8: GPIO 3 → BLK (cyan) -->
    <g transform="translate(0, 460)">
      <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 3</text>
      <text class="role" x="36" y="5" text-anchor="end">backlight</text>
      <path class="wire w-bl" d="M 180 0 L 650 0"/>
      <rect class="pin-box" x="650" y="-14" width="100" height="28" rx="4"/>
      <text class="pin-text" x="700" y="5" text-anchor="middle">BLK / BL</text>
      <text class="role" x="794" y="5">backlight</text>
    </g>
  </g>

  <!-- Divider between display group and button group -->
  <line class="group-rule" x1="80" y1="500" x2="820" y2="500"/>
  <text class="col-sub" x="80" y="520">Button (separate net) — pull-up is configured in firmware, so just two leads to ground.</text>

  <!-- ==================================================================== -->
  <!--  Button group                                                         -->
  <!-- ==================================================================== -->
  <g transform="translate(0, 580)">
    <!-- ESP pin: GPIO 2 -->
    <rect class="pin-box" x="80"  y="-14" width="100" height="28" rx="4"/>
    <text class="pin-text" x="130" y="5" text-anchor="middle">GPIO 2</text>
    <text class="role" x="36" y="5" text-anchor="end">button in</text>

    <!-- wire to button lead 1 -->
    <path class="wire w-btn" d="M 180 0 L 400 0"/>

    <!-- Button graphic -->
    <g transform="translate(400, -22)">
      <rect class="btn-base" x="0" y="0" width="100" height="44" rx="4"/>
      <circle class="btn-cap" cx="50" cy="22" r="14"/>
      <text class="device-sub" x="50" y="60" text-anchor="middle">tactile push button</text>
    </g>

    <!-- Wire from button lead 2 (right side) to display GND -->
    <path class="wire w-gnd" d="M 500 0 L 600 0 L 600 -360 L 650 -360" stroke-dasharray="6 4"/>
    <text class="role" x="612" y="-12">to GND</text>

    <!-- ESP pin: GND (showing this lead also returns to GND, alt route) -->
    <text class="col-sub" x="80" y="40">(any GND pin on the ESP works too; the firmware enables the internal pull-up on GPIO 2)</text>
  </g>

  <!-- ==================================================================== -->
  <!--  Legend                                                               -->
  <!-- ==================================================================== -->
  <g transform="translate(36, 670)">
    <text class="col-sub" x="0" y="0">Color key:</text>
    <g transform="translate(70, -4)">
      <line class="wire w-pwr"  x1="0"  y1="0" x2="22" y2="0"/><text class="role" x="28"  y="4">power</text>
      <line class="wire w-gnd"  x1="78" y1="0" x2="100" y2="0"/><text class="role" x="106" y="4">ground</text>
      <line class="wire w-clk"  x1="160" y1="0" x2="182" y2="0"/><text class="role" x="188" y="4">SPI clock</text>
      <line class="wire w-data" x1="260" y1="0" x2="282" y2="0"/><text class="role" x="288" y="4">SPI data</text>
      <line class="wire w-cs"   x1="350" y1="0" x2="372" y2="0"/><text class="role" x="378" y="4">CS</text>
      <line class="wire w-dc"   x1="408" y1="0" x2="430" y2="0"/><text class="role" x="436" y="4">DC</text>
      <line class="wire w-rst"  x1="466" y1="0" x2="488" y2="0"/><text class="role" x="494" y="4">reset</text>
      <line class="wire w-bl"   x1="538" y1="0" x2="560" y2="0"/><text class="role" x="566" y="4">backlight</text>
      <line class="wire w-btn"  x1="630" y1="0" x2="652" y2="0"/><text class="role" x="658" y="4">button</text>
    </g>
  </g>

  <!-- footer -->
  <text class="subtitle" x="36" y="700">Short-press = next page. Long-press (≥ 800 ms) = jump to Home. Pinout encoded in firmware/include/lgfx_panel.h.</text>
</svg>
