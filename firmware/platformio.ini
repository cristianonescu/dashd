[env:dashd]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 460800
upload_speed = 921600

; Native USB Serial/JTAG for USB-CDC and serial monitor.
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -Iinclude

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
  lovyan03/LovyanGFX@^1.2.0
  bblanchon/ArduinoJson@^7.0.4

; Production build: everything under src/ EXCEPT the spike sketch.
build_src_filter = +<*> +<ui/*> +<pages/*> -<spike/>

; --- dashd + BLE transport -------------------------------------
; Full production firmware WITH the NimBLE BLE transport compiled in.
; `ble_transport.cpp` is wholly behind #ifdef DASHD_ENABLE_BLE, so the
; plain `dashd` env above compiles it as an empty file and needs no
; NimBLE dependency — the BLE code only exists in this env.
[env:dashd_ble]
extends = env:dashd
build_flags =
  ${env:dashd.build_flags}
  -DDASHD_ENABLE_BLE
lib_deps =
  ${env:dashd.lib_deps}
  h2zero/NimBLE-Arduino@^2.1.0

; --- BLE de-risk spike (standalone) -------------------------------------------
; Standalone NimBLE echo server. Build with `pio run -e spike_ble`.
; Isolated from the production `dashd` env: builds ONLY spike/ble_spike.cpp,
; pulls NimBLE-Arduino, and is never part of a normal firmware build.
[env:spike_ble]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
lib_deps =
  h2zero/NimBLE-Arduino@^2.1.0
build_src_filter = -<*> +<spike/ble_spike.cpp>
