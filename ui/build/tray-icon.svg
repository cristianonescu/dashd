<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- A small dashd silhouette: a screen with two bars and a stem.
       Drawn in pure black on a transparent background — macOS treats this
       as a template image so it adapts to dark/light menu bars. -->
  <g fill="#000000">
    <!-- screen body -->
    <rect x="6" y="3" width="20" height="22" rx="3"/>
    <!-- screen "cutout" so the body looks hollow -->
    <rect x="8" y="5" width="16" height="18" rx="1.5" fill="#FFFFFF" fill-opacity="0"/>
    <!-- USB stem -->
    <rect x="13" y="25" width="6" height="4" rx="1"/>
  </g>
  <!-- inner bars to suggest data on screen -->
  <g fill="#000000">
    <rect x="9"  y="8"  width="11" height="2" rx="1"/>
    <rect x="9"  y="12" width="7"  height="2" rx="1"/>
    <rect x="9"  y="16" width="9"  height="2" rx="1"/>
  </g>
</svg>
