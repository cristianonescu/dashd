name: Build installers

# Runs on tag push (v*.*.*) or manual dispatch. Builds the PyInstaller agent
# binary on each host OS, then builds the Electron installer for that OS, and
# attaches everything to a GitHub Release (only on tag push).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

# electron-builder publishes installers to the GitHub Release tied to the
# tag — that requires write access to repo contents from GITHUB_TOKEN.
permissions:
  contents: write

# Tiny helper script consumed by every "upload to release" step. Creates
# the release if it doesn't exist yet (idempotent) then uploads --clobber.
# Defining it inline once would be cleaner, but composite actions live in
# their own files and that's overkill for two callers.
#
# `${RELEASE_TAG}` and the file list come from each step's caller.

jobs:
  # Firmware is OS-agnostic, so we build it once on Linux and attach the
  # .bin to the release. Runs in parallel with the per-OS installer matrix.
  firmware:
    name: firmware (esp32-c3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build BLE + USB firmware variants
        working-directory: firmware
        run: |
          pio run -e dashd_ble
          pio run -e dashd
          # Stage with the names the OTA flow + release page expect.
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            # workflow_dispatch (no tag) — read from config.h so the artifact
            # name still matches what's running on the device.
            VERSION=$(grep -oE 'DASHD_FW_VERSION "[^"]+"' include/config.h | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          mkdir -p artifacts
          cp .pio/build/dashd_ble/firmware.bin "artifacts/dashd-firmware-v${VERSION}-ble.bin"
          cp .pio/build/dashd/firmware.bin     "artifacts/dashd-firmware-v${VERSION}-usb.bin"
          ls -la artifacts

      - name: Upload firmware as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashd-firmware
          path: firmware/artifacts/*.bin
          if-no-files-found: error

      - name: Attach firmware to the release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't already exist. Whichever job
          # in the matrix gets here first wins; subsequent runs see the
          # existing release and skip the create. Without this guard the
          # upload below errors out with "release not found".
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "dashd ${GITHUB_REF_NAME}" \
              --notes "Auto-generated by CI — installer + firmware artifacts attached below. Update notes after the run with \`gh release edit ${GITHUB_REF_NAME} --notes-file ...\`." \
              --draft \
              || true   # another job won the race; harmless
          fi
          gh release upload "${GITHUB_REF_NAME}" firmware/artifacts/*.bin --clobber

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # actions/upload-artifact wants multi-path values one per line
        # (a comma-joined string would match nothing). Every entry below
        # also captures `latest-*.yml` + `*.blockmap` so the
        # electron-updater feed survives even if the release-upload step
        # itself fails — without those metadata files the auto-update
        # path 404s in the desktop app (see v0.1.3 incident).
        include:
          # macos-14 (Apple Silicon) cross-builds BOTH arm64 + x64 DMGs.
          # The dedicated macos-13 (Intel) runner was dropped — GitHub's
          # Intel pool is being wound down and routinely queued for hours.
          # electron-builder happily produces x64 DMGs from arm64 hardware
          # (see `electron-builder --mac --x64`).
          - os: macos-14
            arch: universal
            extra_eb_args: --mac --arm64 --x64
            artifact: |
              ui/release/dashd-*-*.dmg
              ui/release/dashd-*-*.dmg.blockmap
              ui/release/dashd-*-*.zip
              ui/release/dashd-*-*.zip.blockmap
              ui/release/latest-mac.yml
          - os: windows-latest
            arch: x64
            extra_eb_args: --win --x64
            artifact: |
              ui/release/*.exe
              ui/release/*.exe.blockmap
              ui/release/latest.yml
          - os: ubuntu-latest
            arch: x64
            extra_eb_args: --linux
            artifact: |
              ui/release/*.AppImage
              ui/release/*.deb
              ui/release/latest-linux.yml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install agent + build binary
        working-directory: agent
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ runner.os }}" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          python -m pip install --upgrade pip
          python -m pip install -e '.[net]' pyinstaller
          pyinstaller dashd-agent.spec --clean
          ls dist

      - name: Install UI deps
        working-directory: ui
        run: npm ci || npm install

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Package installer
        working-directory: ui
        run: |
          # Build only — don't let electron-builder talk to GitHub. Its
          # publish path has a hard-coded "skip if the release is >2 h
          # old" guard that breaks every rerun and most workflow_dispatch
          # runs. We upload below with `gh release upload` instead, which
          # is unconditional + idempotent.
          npx electron-builder ${{ matrix.extra_eb_args }} --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashd-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

      - name: Attach installer to the release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        # Upload everything electron-builder produced: the installer
        # itself, the matching .blockmap (delta-update metadata), and
        # the latest-*.yml feed file electron-updater polls. Globbing
        # rather than naming each so we don't have to keep this in sync
        # with the matrix entries.
        run: |
          shopt -s nullglob
          # The .zip glob is what makes mac auto-update work — Squirrel.Mac
          # downloads from the .zip, NOT the .dmg. Missing it was the root
          # cause of the v0.1.3 "ZIP file not provided" failure.
          files=( ui/release/*.dmg ui/release/*.exe \
                  ui/release/*.AppImage ui/release/*.deb \
                  ui/release/*.zip \
                  ui/release/*.blockmap \
                  ui/release/latest*.yml )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no installer artifacts to upload — exiting"
            exit 1
          fi
          # Create the release if it doesn't already exist. The firmware
          # job + every OS in this matrix race to create; whichever wins,
          # subsequent calls see the existing release and skip the create.
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "dashd ${GITHUB_REF_NAME}" \
              --notes "Auto-generated by CI — installer + firmware artifacts attached below. Update notes after the run with \`gh release edit ${GITHUB_REF_NAME} --notes-file ...\`." \
              --draft \
              || true   # another job won the race; harmless
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
